networks:
  campus_net:
    driver: bridge

services:
  database:
    image: postgres:15-alpine
    container_name: campuslink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Europe/Paris
    ports:
      - "5432:5432"
    networks:
      - campus_net
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campuslink-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Europe/Paris
    networks:
      - campus_net
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: campuslink-web
    environment:
      - VITE_API_URL=http://localhost:3000
    restart: unless-stopped
    ports:
      - "5173:5173"  # ✅ Nginx écoute sur 5173, pas 80
    networks:
      - campus_net
    depends_on:
      - backend

volumes:
  pg_data: