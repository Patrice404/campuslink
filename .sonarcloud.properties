# SonarCloud Configuration for CampusLink

sonar.projectKey=campuslink
sonar.projectName=CampusLink
sonar.organization=Patrice404

# Source directories
sonar.sources=backend/src,frontend/src
sonar.sourceEncoding=UTF-8

# Test coverage
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.spec.vue,**/*.test.ts,**/node_modules/**

# Code analysis exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.spec.vue,**/*.test.ts,**/coverage/**

# Duplication exclusions
sonar.cpd.exclusions=**/node_modules/**,**/dist/**

# TypeScript settings
sonar.typescript.tsconfigPath=./tsconfig.json
sonar.typescript.node_process_debug_memory_limit=4096

# Vue settings
sonar.vue.eslintIntegration=true

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
